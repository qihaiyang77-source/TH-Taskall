
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TaskPulse - T&H INTERNATIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#3b82f6',
              secondary: '#64748b',
              success: '#22c55e',
              warning: '#eab308',
              danger: '#ef4444',
            },
            screens: {
              'xs': '480px',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f8fafc;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      /* 隐藏滚动条但保留功能 - 用于移动端过滤器 */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* 核心自定义滚动条 */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Markdown 渲染样式定制 */
      .ai-report-content strong {
        color: #eab308;
        font-weight: 900;
      }
      .ai-report-content h1, .ai-report-content h2, .ai-report-content h3 {
        color: #eab308;
        font-weight: 900;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        border-bottom: 1px solid rgba(234,179,8,0.2);
        padding-bottom: 0.25rem;
      }
      .ai-report-content p {
        margin-bottom: 0.75rem;
      }
      .ai-report-content ul, .ai-report-content ol {
        margin-bottom: 1rem;
        padding-left: 1.25rem;
      }
      .ai-report-content li {
        margin-bottom: 0.4rem;
        position: relative;
      }
      .ai-report-content ul li::before {
        content: "•";
        color: #22c55e;
        font-weight: bold;
        display: inline-block;
        width: 1em;
        margin-left: -1em;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "marked": "https://esm.sh/marked@^15.0.0",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.5",
    "body-parser": "https://esm.sh/body-parser@^2.2.2",
    "fs": "https://esm.sh/fs@^0.0.1-security",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4",
    "mysql2/": "https://esm.sh/mysql2@^3.16.1/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "dotenv/": "https://esm.sh/dotenv@^17.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
